preferences:
  roles:
    - "Software Engineer II"
    - "Senior Software Engineer"
    - "Backend Engineer"
    - "Software Development Engineer II"
    - "SDE II"
    - "Backend Developer"
    - "Full Stack Engineer"

  locations:
    - "Remote"
    - "Bangalore"
    - "Delhi NCR"

  # Remote jobs are only accepted if the listed country/region appears in the location.
  # Jobs listed as plain "Remote" with no country are allowed through.
  remote_locations:
    - "India"
    - "IN"

  current_salary_lpa: 25
  expected_salary_lpa: 30
  min_salary_lpa: 28
  max_salary_lpa: 40

  industries:
    - "Cybersecurity"
    - "AI/ML"
    - "Developer Tools"
    - "FinTech"
    - "SaaS"
    - "HealthTech"

  exclude_companies:
    - "Infosys"
    - "Wipro"
    - "TCS"
    - "Cognizant"
    - "Accenture"
    - "HCL"
    - "Tech Mahindra"

  keywords_must_have:
    - "Python"
    - "Backend"
    - "REST API"
    - "Postgres"
    - "Django"
    - "FastAPI"
    - "Microservices"

  keywords_nice_to_have:
    tier1:
      - "Django"
      - "FastAPI"
      - "Elasticsearch"
      - "Microservices"
      - "Kubernetes"
    tier2:
      - "Go"
      - "Golang"
      - "React"
      - "AWS"
      - "Docker"

  keywords_exclude:
    - "PHP"
    - "Ruby"
    - ".NET"
    - "SAP"
    - "Mainframe"
    - "Embedded Systems"

  industry_keywords:
    Cybersecurity:
      - "security"
      - "threat"
      - "SOC"
      - "vulnerability"
      - "SIEM"
      - "pentest"
      - "pen test"
      - "cyware"
    AI/ML:
      - "machine learning"
      - "LLM"
      - "artificial intelligence"
      - "data science"
      - "MLOps"
      - "generative AI"
    Developer Tools:
      - "developer platform"
      - "devtools"
      - "SDK"
      - "developer experience"
      - "DX"
      - "CLI tool"
    FinTech:
      - "fintech"
      - "payments"
      - "banking"
      - "financial services"
      - "lending"
      - "trading"
      - "wallet"
    SaaS:
      - "SaaS"
      - "multi-tenant"
      - "subscription"
      - "cloud platform"
      - "B2B software"
    HealthTech:
      - "healthtech"
      - "healthcare"
      - "medical"
      - "clinical"
      - "EHR"
      - "patient"

  experience_level:
    - "mid"
    - "senior"
    - "SDE II"
    - "SDE III"

  employment_type:
    - "full-time"

  search:
    sites:
      - linkedin
      - indeed
    results_per_role: 200
    hours_old: 72
    country: "India"
    greenhouse_enabled: true
    lever_enabled: true

  experience_years:
    min: 1
    max: 4

  resume_variants:
    - path: "data/resumes/resume_backend_python.pdf"
      label: "Backend Python"
      tags: ["Python", "Backend", "FastAPI", "Django", "REST API", "Microservices", "PostgreSQL", "Redis"]
    - path: "data/resumes/resume_fullstack.pdf"
      label: "Full Stack"
      tags: ["Python", "React", "TypeScript", "Full Stack", "Frontend", "REST API", "Node.js"]

  max_applications_per_day: 15
  min_match_score: 70

  personal_info:
    name: "Shashank Srivastava"
    email: "shashank.srivastava25sks@gmail.com"
    phone: "+91-9793422020"
    linkedin: "linkedin.com/in/shashank-srivastava1503/"
